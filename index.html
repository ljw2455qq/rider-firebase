<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>OpenStreetMap GPS Overlay</title>

<!-- Leaflet: 오픈소스 지도 라이브러리 -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- RTIRL -->
<script src="https://cdn.jsdelivr.net/npm/@rtirl/api@latest/lib/index.min.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: 'Noto Sans KR', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* 전체 지도 프레임 */
  #mapWrap {
    position: relative;
    width: 300px;
    height: 250px;
    border-radius: 18px;
    padding: 3px;
    background: linear-gradient(135deg, rgba(0,255,255,.95), rgba(0,90,255,.55), rgba(0,255,180,.75));
    box-shadow:
      0 0 18px rgba(0,255,255,.75),
      0 0 34px rgba(0,140,255,.35);
    overflow: hidden;
  }

  #map {
    width: 100%;
    height: 100%;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(0,0,0,.2);
  }

  /* 어두운 방송용 톤 */
  .leaflet-tile {
    filter: saturate(1.15) contrast(1.08) brightness(.82);
  }

  /* 지도 위 글로우/비네팅 */
  #mapWrap::after {
    content: "";
    position: absolute;
    inset: 3px;
    border-radius: 15px;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 45%, rgba(0,255,255,.03), transparent 48%),
      linear-gradient(to bottom, rgba(0,0,0,.02), rgba(0,0,0,.24));
    box-shadow: inset 0 0 22px rgba(0,0,0,.45);
    z-index: 500;
  }

  /* 상단 LIVE GPS 배지 */
  #gpsBadge {
    position: absolute;
    left: 12px;
    top: 10px;
    z-index: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(0,0,0,.58);
    color: #eaffff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .5px;
    text-shadow: 0 0 6px rgba(0,255,255,.8);
    backdrop-filter: blur(4px);
  }

  #gpsBadge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00fff0;
    box-shadow: 0 0 8px #00fff0;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .45; transform: scale(.72); }
  }

  /* 내 위치 마커 */
  .profile-marker {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background-image: url("profile.png");
    background-size: cover;
    background-position: center;
    border: 2px solid #fff;
    box-shadow:
      0 0 0 4px rgba(0,255,255,.20),
      0 0 14px rgba(0,255,255,.95),
      0 0 28px rgba(0,160,255,.55);
  }

  .profile-marker::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,255,.38);
    transform: translate(-50%, -50%);
    animation: markerRing 1.7s infinite;
  }

  @keyframes markerRing {
    0% { transform: translate(-50%, -50%) scale(.65); opacity: .9; }
    100% { transform: translate(-50%, -50%) scale(1.35); opacity: 0; }
  }

  /* Leaflet 기본 UI 제거 */
  .leaflet-control-container {
    display: none !important;
  }
</style>
</head>

<body>
<div id="mapWrap">
  <div id="map"></div>
  <div id="gpsBadge"><span class="dot"></span>LIVE GPS</div>
</div>

<script>
/* =============================
   기본 설정
============================= */
const PULL_KEY = "zeoeyze9htbyx455";

/* 세종시 초기 좌표: [경도, 위도] */
let currentPos = [127.289, 36.48];
let animating = false;
let pendingPos = null;

function toLeaflet(pos) {
  return [pos[1], pos[0]]; // Leaflet은 [위도, 경도]
}

/* =============================
   지도 생성: Leaflet + OpenStreetMap
============================= */
const map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  boxZoom: false,
  keyboard: false,
  tap: false,
  touchZoom: false
}).setView(toLeaflet(currentPos), 15);

/* 오픈소스 지도 타일: OpenStreetMap */
L.tileLayer('https://' + '{s}' + '.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  crossOrigin: true
}).addTo(map);

/* =============================
   마커 생성
============================= */
const markerIcon = L.divIcon({
  className: '',
  html: '<div class="profile-marker"></div>',
  iconSize: [30, 30],
  iconAnchor: [15, 15]
});

const marker = L.marker(toLeaflet(currentPos), { icon: markerIcon }).addTo(map);

/* =============================
   프랭크 스타일 부드러운 이동
============================= */
function smoothMove(from, to, duration = 1200) {
  if (animating) {
    pendingPos = to;
    return;
  }
  animating = true;

  const start = performance.now();

  function animate(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);

    const lng = from[0] + (to[0] - from[0]) * ease;
    const lat = from[1] + (to[1] - from[1]) * ease;
    const next = [lng, lat];

    marker.setLatLng(toLeaflet(next));
    map.panTo(toLeaflet(next), { animate: false });

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      currentPos = to;
      animating = false;

      if (pendingPos) {
        const nextPending = pendingPos;
        pendingPos = null;
        smoothMove(currentPos, nextPending);
      }
    }
  }

  requestAnimationFrame(animate);
}

/* =============================
   RTIRL 실시간 위치 수신
============================= */
RealtimeIRL.forPullKey(PULL_KEY).addLocationListener((location) => {
  if (!location.latitude || !location.longitude) return;

  const nextPos = [
    location.longitude,
    location.latitude
  ];

  smoothMove(currentPos, nextPos);
});
</script>
</body>
</html>
